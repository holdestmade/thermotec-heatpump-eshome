esphome:
  name: heat-pump-controller
  friendly_name: Heat Pump Controller
  comment: ESP32
  areas:
    - id: back_garden_area
      name: "Back Garden"

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

packages:
  device_base: !include common/esp-config-default.yaml

external_components:
  - source:
      type: local
      path: components
    components: [pool_heatpump_climate]

substitutions:
  service_uuid: "0000ff01-0000-1000-8000-00805f9b34fb"
  write_char_uuid: "0000ff03-0000-1000-8000-00805f9b34fb"
  notify_char_uuid: "0000ff02-0000-1000-8000-00805f9b34fb"

globals:
  - id: ble_connected
    type: bool
    initial_value: 'false'
    restore_value: no

# ─── Logging ────────────────────────────────────────────────────────────────
logger:
  level: INFO
  baud_rate: 115200
  logs:
    ble_sensor: ERROR
    sensor: WARN

time:
  - platform: homeassistant
    id: ha_time

esp32_ble_tracker:
  scan_parameters:
    interval: 320ms
    window: 30ms
    active: true

ble_client:
  - mac_address: "08:06:BC:80:C0:13"
    id: heatpump_ble
    auto_connect: true
    on_connect:
      then:
        - logger.log: "Heat pump connected"
        - lambda: 'id(ble_connected) = true;'
        - delay: 3s
        - script.execute: poll_heat_pump
        - component.update: last_connected
    on_disconnect:
      then:
        - logger.log: "Heat pump disconnected"
        - lambda: 'id(ble_connected) = false;'

number:
  - platform: template
    name: "Target Temperature"
    id: target_temp_control
    min_value: 10
    max_value: 40
    step: 0.5
    unit_of_measurement: "°C"
    device_class: temperature
    mode: slider
    optimistic: true
    set_action:
      - logger.log:
          level: INFO
          format: "Target set to %.1f — writing to heat pump"
          args: ['x']
      - script.execute:
          id: write_target_temp
          temp_x10: !lambda 'return (int)(x * 10);'
      - delay: 2s
      - script.execute: poll_heat_pump

switch:
  - platform: template
    name: "Power"
    id: heater_power
    icon: "mdi:power"
    optimistic: true
    turn_on_action:
      - logger.log: "Power switch ON — writing to heat pump"
      - script.execute:
          id: write_power_state
          power_on: true
      - delay: 2s
      - script.execute: poll_heat_pump
    turn_off_action:
      - logger.log: "Power switch OFF — writing to heat pump"
      - script.execute:
          id: write_power_state
          power_on: false
      - delay: 2s
      - script.execute: poll_heat_pump

select:
  - platform: template
    name: "Mode"
    id: heater_mode
    icon: "mdi:thermostat"
    optimistic: true
    options:
      - "Heat"
      - "Cool"
      - "Auto"
    set_action:
      - logger.log:
          level: INFO
          format: "Mode set to %s — writing to heat pump"
          args: ['x.c_str()']
      - script.execute:
          id: write_mode
          mode: !lambda 'return x;'
      - delay: 2s
      # Re-poll so the target temperature display follows the new mode.
      - script.execute: poll_heat_pump

binary_sensor:
  - platform: template
    id: ble_status
    name: "Heat Pump BLE Connection"
    device_class: connectivity
    lambda: 'return id(ble_connected);'

  - platform: template
    id: output_compressor
    name: "Compressor"
    icon: "mdi:engine"
    device_class: running
    entity_category: diagnostic
    filters:
      - delayed_on_off: 1s

  - platform: template
    id: output_circulate_pump
    name: "Circulate Pump"
    icon: "mdi:pump"
    device_class: running
    entity_category: diagnostic
    filters:
      - delayed_on_off: 1s

  - platform: template
    id: output_high_fan
    name: "High Fan"
    icon: "mdi:fan"
    device_class: running
    entity_category: diagnostic
    filters:
      - delayed_on_off: 1s

  - platform: template
    id: output_4way_valve
    name: "4-Way Valve"
    icon: "mdi:valve"
    device_class: opening
    entity_category: diagnostic
    filters:
      - delayed_on_off: 1s

  - platform: template
    id: has_error
    name: "Has Error"
    icon: "mdi:alert"
    device_class: problem
    entity_category: diagnostic

  - platform: template
    id: inlet_temp_fault
    name: "Inlet Temp Sensor Fault (P01)"
    device_class: problem
    entity_category: diagnostic
    on_state:
      then:
        - script.execute: recompute_error_status

  - platform: template
    id: outlet_temp_fault
    name: "Outlet Temp Sensor Fault (P02)"
    device_class: problem
    entity_category: diagnostic
    on_state:
      then:
        - script.execute: recompute_error_status

  - platform: template
    id: ambient_temp_fault
    name: "Ambient Temp Sensor Fault (P04)"
    device_class: problem
    entity_category: diagnostic
    on_state:
      then:
        - script.execute: recompute_error_status

  - platform: template
    id: coil_temp_fault
    name: "Coil Temp Sensor Fault (P05)"
    device_class: problem
    entity_category: diagnostic
    on_state:
      then:
        - script.execute: recompute_error_status

  - platform: template
    id: exhaust_temp_fault
    name: "Exhaust Temp Sensor Fault (P81)"
    device_class: problem
    entity_category: diagnostic
    on_state:
      then:
        - script.execute: recompute_error_status

  - platform: template
    id: unit_running
    name: "Unit Running"
    icon: "mdi:engine"
    device_class: running
    entity_category: diagnostic

sensor:
  - platform: ble_client
    type: characteristic
    ble_client_id: heatpump_ble
    id: notify_handler
    name: "Heat Pump Raw Notify"
    service_uuid: ${service_uuid}
    characteristic_uuid: ${notify_char_uuid}
    notify: true
    internal: true
    lambda: |-
      // Sanity check
      if (x.size() < 5 || x[0] != 0x63) return {};

      // Write ACK (8-byte Modbus 0x10 response)
      if (x[1] == 0x10 && x.size() == 8) {
        uint16_t ack = (x[2] << 8) | x[3];
        ESP_LOGI("heatpump", "Write ACK for 0x%04X", ack);
        return {};
      }

      // Modbus exception
      if ((x[1] & 0x80) && x.size() >= 5) {
        ESP_LOGW("heatpump", "Modbus exception 0x%02X for func 0x%02X",
                 x[2], x[1] & 0x7F);
        return {};
      }

      // Data block (fragmented read response).
      // Format: 63 10 [block_hi] [block_lo] 00 2D 5A [9 regs of data...]
      if (x[1] != 0x10 || x.size() < 9) return {};

      uint16_t block = (x[2] << 8) | x[3];
      auto rd = [&](size_t i) -> int16_t {
        size_t p = 7 + i * 2;
        if (p + 1 >= x.size()) return 0;
        return (int16_t)((x[p] << 8) | x[p+1]);
      };

      if (block == 0x07FE) {
        // signals different failure sentinel values per sensor:
        //   T02 Inlet, T03 Outlet, T04 Coil, T06 Exhaust → 0x7FFD
        //   T05 Ambient                                  → 0xFFF6 (-1.0°C)
        // T01 Suction always reads 0x7FFD on single-system models.
        // When a sensor is faulted we publish NAN to the temperature (so HA
        // shows "unavailable" rather than a bogus reading) and raise the
        // matching P-code fault binary sensor.
        auto pub_temp = [](esphome::template_::TemplateSensor *temp_sensor,
                           esphome::template_::TemplateBinarySensor *fault_sensor,
                           int16_t raw,
                           bool is_ambient) {
          bool fault;
          if (is_ambient) {
            fault = (raw == (int16_t)0xFFF6) || ((raw & 0xFFF0) == 0x7FF0);
          } else {
            fault = ((raw & 0xFFF0) == 0x7FF0);
          }
          fault_sensor->publish_state(fault);
          if (fault) {
            temp_sensor->publish_state(NAN);
          } else {
            temp_sensor->publish_state(raw / 10.0);
          }
        };

        pub_temp(id(inlet_temp),   id(inlet_temp_fault),   rd(1), false);
        pub_temp(id(outlet_temp),  id(outlet_temp_fault),  rd(2), false);
        pub_temp(id(coil_temp),    id(coil_temp_fault),    rd(3), false);
        pub_temp(id(ambient_temp), id(ambient_temp_fault), rd(4), true);
        pub_temp(id(exhaust_temp), id(exhaust_temp_fault), rd(5), false);
        ESP_LOGI("heatpump", "Temps updated");
      } else if (block == 0x0416) {
        // Each mode has its own target register in this block:
        //   reg 0  (0x0416) = R01 Heating set
        //   reg 5  (0x041B) = R06 Cooling set
        //   reg 22 (0x042C) = R11 Auto set
        // The heat pump's display shows whichever matches the current mode,
        // so we mirror that here.
        std::string mode_str = id(heater_mode).has_state()
                               ? id(heater_mode).current_option()
                               : std::string("Heat");
        float displayed_target;
        if (mode_str == "Cool")      displayed_target = rd(5)  / 10.0;
        else if (mode_str == "Auto") displayed_target = rd(22) / 10.0;
        else                         displayed_target = rd(0)  / 10.0;
        // Guarded by a 0.05°C delta to suppress duplicate BLE responses.
        if (!id(target_temp_control).has_state() ||
            fabsf(id(target_temp_control).state - displayed_target) > 0.05f) {
          id(target_temp_control).publish_state(displayed_target);
        }
        ESP_LOGI("heatpump", "Target (%s mode) = %.1f",
                 mode_str.c_str(), displayed_target);

        // Diagnostic sensors — always publish all three set-points
        id(heating_set_temp).publish_state(rd(0) / 10.0);
        id(cooling_set_temp).publish_state(rd(5) / 10.0);
        id(auto_set_temp).publish_state(rd(22) / 10.0);
        id(min_heat_temp).publish_state(rd(3) / 10.0);
        id(max_heat_temp).publish_state(rd(4) / 10.0);
        id(min_cool_temp).publish_state(rd(8) / 10.0);
        id(max_cool_temp).publish_state(rd(9) / 10.0);

        // D06 Defrost type at reg 15 (0x0425): 0=Normal, 1=Eco
        int16_t dt = rd(15);
        id(defrost_type).publish_state(
          dt == 0 ? std::string("Normal") :
          dt == 1 ? std::string("Eco") :
          std::string("Unknown"));

        ESP_LOGI("heatpump", "Heat Pump target = %.1f", rd(0) / 10.0);
      } else if (block == 0x03E9) {
        // Block containing register 0x03F3 at offset 10 = power state
        int16_t power = rd(10);
        bool is_on = (power != 0);
        if (id(heater_power).state != is_on) {
          id(heater_power).publish_state(is_on);
        }

        // Mode at offset 11 (register 0x03F4)
        // 0 = Heat, 1 = Cool, 2 = Auto
        int16_t mode = rd(11);
        const char *mode_str;
        switch (mode) {
          case 0:  mode_str = "Heat"; break;
          case 1:  mode_str = "Cool"; break;
          case 2:  mode_str = "Auto"; break;
          default: mode_str = "Unknown"; break;
        }
        // Skip "Unknown" so we never push an option the Select doesn't list.
        std::string ms(mode_str);
        if (ms != "Unknown" &&
            (!id(heater_mode).has_state() || id(heater_mode).current_option() != ms)) {
          id(heater_mode).publish_state(ms);
        }

        // H06 Mode type at reg 22 (0x03FF): 1=Heat pump, 2=Heat only (4-way valve)
        int16_t mt = rd(22);
        id(heater_mode_type).publish_state(
          mt == 1 ? std::string("Heat pump") :
          mt == 2 ? std::string("Heat only (4-way valve)") :
          std::string("Unknown"));

        // P01 Circulating pump mode at reg 36 (0x040D): 0=Normal, 1=Stop, 2=Interval
        int16_t pm = rd(36);
        id(pump_mode).publish_state(
          pm == 0 ? std::string("Normal") :
          pm == 1 ? std::string("Stop") :
          pm == 2 ? std::string("Interval") :
          std::string("Unknown"));

        ESP_LOGI("heatpump", "Heat Pump power=%s mode=%s", is_on ? "ON" : "OFF", mode_str);

      } else if (block == 0x07D1) {
        // Block containing output states at offset 18 (register 0x07E3).
        // Bitmask:
        //   bit 0 (0x01) = compressor  (confirmed via capture)
        //   bit 1 (0x02) = circulate pump  (inferred from app O01-O04 order)
        //   bit 2 (0x04) = high fan  (confirmed via capture)
        //   bit 3 (0x08) = 4-way valve  (inferred from app O01-O04 order)
        int16_t outputs = rd(18);
        id(output_compressor).publish_state((outputs & 0x01) != 0);
        id(output_circulate_pump).publish_state((outputs & 0x02) != 0);
        id(output_high_fan).publish_state((outputs & 0x04) != 0);
        id(output_4way_valve).publish_state((outputs & 0x08) != 0);

        // Firmware identity (block 0x07D1 reg 16 + reg 17).
        // These are stable across reads — published once per session.
        // reg 16 (0x07E1) = "Master program version number", DIGI5 (×10)
        //                   e.g. raw 12 → "1.2"
        // reg 17 (0x07E2) = "Main control software code", DIGI1 (raw)
        //                   e.g. 494
        uint16_t master_ver_raw = rd(16);
        uint16_t soft_code      = rd(17);

        char ver_buf[16];
        snprintf(ver_buf, sizeof(ver_buf), "%u.%u",
                 master_ver_raw / 10, master_ver_raw % 10);
        std::string ver_str(ver_buf);
        if (!id(master_program_version).has_state() ||
            id(master_program_version).state != ver_str) {
          id(master_program_version).publish_state(ver_str);
        }

        char code_buf[16];
        snprintf(code_buf, sizeof(code_buf), "%u", soft_code);
        std::string code_str(code_buf);
        if (!id(main_control_software_code).has_state() ||
            id(main_control_software_code).state != code_str) {
          id(main_control_software_code).publish_state(code_str);
        }

        // 0 = stopped (may indicate self-shutdown after a fault), 1 = running.
        // Distinct from power state (0x03F3): power = user's on/off command,
        // unit_running = whether the pump is actually operating.
        id(unit_running).publish_state(rd(10) != 0);

        // Error code at offset 33 (register 0x07F2).
        // 0 = no error; 4 = E03 (water flow) confirmed via BLE capture, but see comment below on
        // error_code and error_description sensor for more details on the raw code and display mapping.
        int16_t err = rd(33);
        id(error_code).publish_state(err);

        ESP_LOGI("heatpump", "Outputs = 0x%04X, Error = 0x%04X", outputs, err);
      }
      return {};

  - platform: template
    id: inlet_temp
    name: "Inlet Water Temperature"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - delta: 0.05 

  - platform: template
    id: outlet_temp
    name: "Outlet Water Temperature"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - delta: 0.05

  - platform: template
    id: coil_temp
    name: "Coil Temperature"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - delta: 0.05

  - platform: template
    id: ambient_temp
    name: "Ambient Temperature"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - delta: 0.05

  - platform: template
    id: exhaust_temp
    name: "Exhaust Temperature"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - delta: 0.05

  - platform: template
    id: heating_set_temp
    name: "Heating Set Point"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    entity_category: diagnostic
    filters:
      - delta: 0.05

  - platform: template
    id: cooling_set_temp
    name: "Cooling Set Point"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    entity_category: diagnostic
    filters:
      - delta: 0.05

  - platform: template
    id: auto_set_temp
    name: "Auto Set Point"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    entity_category: diagnostic
    filters:
      - delta: 0.05

  - platform: template
    id: min_heat_temp
    name: "Min Heat Temperature"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    entity_category: diagnostic
    filters:
      - delta: 0.05

  - platform: template
    id: max_heat_temp
    name: "Max Heat Temperature"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    entity_category: diagnostic
    filters:
      - delta: 0.05

  - platform: template
    id: min_cool_temp
    name: "Min Cool Temperature"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    entity_category: diagnostic
    filters:
      - delta: 0.05

  - platform: template
    id: max_cool_temp
    name: "Max Cool Temperature"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    entity_category: diagnostic
    filters:
      - delta: 0.05

  - platform: template
    id: error_code
    name: "Error Code"
    icon: "mdi:alert-circle"
    entity_category: diagnostic
    accuracy_decimals: 0
    update_interval: never
    on_value:
      then:
        - script.execute: recompute_error_status

text_sensor:
  - platform: template
    name: "Last Connected"
    id: last_connected
    icon: "mdi:clock-outline"
    entity_category: diagnostic
    update_interval: never
    lambda: |-
      auto now = id(ha_time).now();
      // Return nothing if time hasn't synced yet — avoids a garbage stamp.
      if (!now.is_valid()) return {};
      char buf[32];
      snprintf(buf, sizeof(buf), "%04d-%02d-%02d %02d:%02d:%02d",
               now.year, now.month, now.day_of_month,
               now.hour, now.minute, now.second);
      return {buf};

  - platform: template
    name: "Error Description"
    id: error_description
    icon: "mdi:alert-circle-outline"
    entity_category: diagnostic
    update_interval: never
    lambda: |-
      // E-codes from the error register (now decoded as a bitmask, not a
      // single value) plus the P-code temperature sensor failures.
      std::string result;
      auto append = [&](const std::string &s) {
        if (!result.empty()) result += "; ";
        result += s;
      };

      // E-codes from error register (bitmask at 0x07F2)
      if (id(error_code).has_state()) {
        uint16_t code = (uint16_t)(int)id(error_code).state;
        // Confirmed/inferred mappings on this model:
        if (code & 0x0001) append("E01 High pressure protection");  // bit 0 — inferred
        if (code & 0x0002) append("E02 Low pressure protection");   // bit 1 — confirmed
        if (code & 0x0004) append("E03 No water flow");             // bit 2 — confirmed
        uint16_t known = 0x0007;
        uint16_t unknown = code & ~known;
        if (unknown) {
          char buf[40];
          snprintf(buf, sizeof(buf), "E-unknown bits 0x%04X", unknown);
          append(buf);
        }
      }

      // P-codes from temperature sensor failures
      if (id(inlet_temp_fault).state)   append("P01 Inlet sensor");
      if (id(outlet_temp_fault).state)  append("P02 Outlet sensor");
      if (id(ambient_temp_fault).state) append("P04 Ambient sensor");
      if (id(coil_temp_fault).state)    append("P05 Coil sensor");
      if (id(exhaust_temp_fault).state) append("P81 Exhaust sensor");

      return result.empty() ? std::string("OK") : result;

  - platform: template
    id: defrost_type
    name: "Defrost Type"
    icon: "mdi:snowflake-melt"
    entity_category: diagnostic

  - platform: template
    id: heater_mode_type
    name: "Heat Pump Mode Type"
    icon: "mdi:cog"
    entity_category: diagnostic

  - platform: template
    id: pump_mode
    name: "Circulating Pump Mode"
    icon: "mdi:pump"
    entity_category: diagnostic

  - platform: template
    name: "Master Program Version"
    id: master_program_version
    icon: "mdi:chip"
    entity_category: diagnostic

  - platform: template
    name: "Main Control Software Code"
    id: main_control_software_code
    icon: "mdi:chip"
    entity_category: diagnostic

climate:
  - platform: pool_heatpump_climate
    name: "Pool Heat Pump"
    id: pool_heat_pump
    sensor: inlet_temp
    target_number: target_temp_control
    power_switch: heater_power
    mode_select: heater_mode
    compressor_sensor: output_compressor
    fan_sensor: output_high_fan

script:
  # Single source of truth for the "Has Error" rollup. Called from every
  # fault binary_sensor's on_state and from error_code's on_value so the
  # logic lives in exactly one place.
  - id: recompute_error_status
    then:
      - component.update: error_description
      - lambda: |-
          bool err = (id(error_code).has_state() && id(error_code).state != 0) ||
                     id(inlet_temp_fault).state ||
                     id(outlet_temp_fault).state ||
                     id(ambient_temp_fault).state ||
                     id(coil_temp_fault).state ||
                     id(exhaust_temp_fault).state;
          id(has_error).publish_state(err);

  - id: poll_heat_pump
    then:
      - ble_client.ble_write:
          id: heatpump_ble
          service_uuid: ${service_uuid}
          characteristic_uuid: ${write_char_uuid}
          value: [0x63, 0x03, 0x00, 0x07, 0x00, 0x2D, 0x3C, 0x54]

  - id: write_target_temp
    parameters:
      temp_x10: int
    then:
      - ble_client.ble_write:
          id: heatpump_ble
          service_uuid: ${service_uuid}
          characteristic_uuid: ${write_char_uuid}
          value: !lambda |-
            // Resolve the active mode so we target the right register.
            std::string mode_str = id(heater_mode).has_state()
                                   ? id(heater_mode).current_option()
                                   : std::string("Heat");

            // Clamp to the heat pump's accepted range.
            // This is hard-coded, but could read from the diagnostic sensors
            // that output the configured range.
            if (mode_str == "Cool") {
              if (temp_x10 < 100) temp_x10 = 100;   // R09 Min cool = 10°C
              if (temp_x10 > 350) temp_x10 = 350;   // R10 Max cool = 35°C
            } else {
              // Heat & Auto both use heat range
              if (temp_x10 < 150) temp_x10 = 150;   // R04 Min heat = 15°C
              if (temp_x10 > 400) temp_x10 = 400;   // R05 Max heat = 40°C
            }

            // Pick the right register based on current mode
            uint8_t addr_hi = 0x04, addr_lo = 0x16;  // default: heat
            if (mode_str == "Cool") {
              addr_hi = 0x04; addr_lo = 0x1B;
            } else if (mode_str == "Auto") {
              addr_hi = 0x04; addr_lo = 0x2C;
            }

            std::vector<uint8_t> msg = {
              0x63, 0x10, addr_hi, addr_lo, 0x00, 0x01, 0x02,
              (uint8_t)((temp_x10 >> 8) & 0xFF),
              (uint8_t)(temp_x10 & 0xFF)
            };
            uint16_t crc = 0xFFFF;
            for (auto b : msg) {
              crc ^= b;
              for (int j = 0; j < 8; j++)
                crc = (crc & 1) ? ((crc >> 1) ^ 0xA001) : (crc >> 1);
            }
            msg.push_back(crc & 0xFF);
            msg.push_back((crc >> 8) & 0xFF);

            ESP_LOGI("heatpump", "Set %s target = %.1f (reg 0x%02X%02X)",
                     mode_str.c_str(), temp_x10 / 10.0, addr_hi, addr_lo);
            return msg;

  - id: write_power_state
    parameters:
      power_on: bool
    then:
      - ble_client.ble_write:
          id: heatpump_ble
          service_uuid: ${service_uuid}
          characteristic_uuid: ${write_char_uuid}
          value: !lambda |-
            uint8_t val = power_on ? 0x01 : 0x00;
            std::vector<uint8_t> msg = {
              0x63, 0x10, 0x03, 0xF3, 0x00, 0x01, 0x02, 0x00, val
            };
            // CRC16 (Modbus RTU)
            uint16_t crc = 0xFFFF;
            for (auto b : msg) {
              crc ^= b;
              for (int j = 0; j < 8; j++)
                crc = (crc & 1) ? ((crc >> 1) ^ 0xA001) : (crc >> 1);
            }
            msg.push_back(crc & 0xFF);
            msg.push_back((crc >> 8) & 0xFF);
            ESP_LOGI("heatpump", "Set power = %s", power_on ? "ON" : "OFF");
            return msg;

  - id: write_mode
    parameters:
      mode: string
    then:
      - ble_client.ble_write:
          id: heatpump_ble
          service_uuid: ${service_uuid}
          characteristic_uuid: ${write_char_uuid}
          value: !lambda |-
            // Translate string mode to (mode_val, second_reg) pair.
            // The second register's exact meaning is unknown but the values
            // below match what the official AquaTemp app sends.
            uint8_t mode_lo, sec_hi, sec_lo;
            if (mode == "Cool") {
              mode_lo = 0x01; sec_hi = 0x00; sec_lo = 0x88;
            } else if (mode == "Auto") {
              mode_lo = 0x02; sec_hi = 0x00; sec_lo = 0x8C;
            } else {
              // Default to Heat (mode 0) — also covers any unrecognised string
              mode_lo = 0x00; sec_hi = 0x00; sec_lo = 0x00;
            }

            std::vector<uint8_t> msg = {
              0x63, 0x10, 0x03, 0xF4, 0x00, 0x02, 0x04,
              0x00, mode_lo,
              sec_hi, sec_lo
            };
            // CRC16 (Modbus RTU)
            uint16_t crc = 0xFFFF;
            for (auto b : msg) {
              crc ^= b;
              for (int j = 0; j < 8; j++)
                crc = (crc & 1) ? ((crc >> 1) ^ 0xA001) : (crc >> 1);
            }
            msg.push_back(crc & 0xFF);
            msg.push_back((crc >> 8) & 0xFF);
            ESP_LOGI("heatpump", "Set mode = %s", mode.c_str());
            return msg;

interval:
  - interval: 30s
    then:
      # Only poll when the link is up — avoids a failed BLE write (and the
      # accompanying warning) every 30 s while the pump is out of range.
      - if:
          condition:
            lambda: 'return id(ble_connected);'
          then:
            - script.execute: poll_heat_pump
